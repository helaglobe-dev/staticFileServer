server {
    listen 80;
    server_name _;

    root /srv/static;
    charset utf-8;

    # ── SECURITY HEADERS ────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # Nasconde versione nginx
    server_tokens off;

    # ── BLOCCA FILE NASCOSTI (.env, .git, ecc.) ─────────────
    location ~ /\. {
        deny all;
        return 403;
    }

    # ── ASSET CON CACHE AGGRESSIVA ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── TUTTO IL RESTO → FILE STATICI ───────────────────────
    location / {
        autoindex on;
        autoindex_exact_size off;   # mostra KB/MB invece di bytes
        autoindex_localtime on;     # orario locale nel listing
        try_files $uri $uri/ =404;
    }

    # Dimensione max upload (disabilitato — sola lettura)
    client_max_body_size 1m;
}