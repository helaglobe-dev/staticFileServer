services:

  # ── NEWT (tunnel → nginx-static) ──────────────────────────
  newt-static:
    image: fosrl/newt
    container_name: newt-static
    restart: always
    networks:
      - static_tunnel_net
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
      - NEWT_TARGET=http://nginx-static:80
    depends_on:
      - nginx-static
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE_NEWT}"
        max-file: "${LOG_MAX_FILES_NEWT}"

  # ── NEWT (tunnel → filebrowser) ───────────────────────────
  newt-filebrowser:
    image: fosrl/newt
    container_name: newt-filebrowser
    restart: always
    networks:
      - filebrowser_net
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID_FILEBROWSER}
      - NEWT_SECRET=${NEWT_SECRET_FILEBROWSER}
      - NEWT_TARGET=http://filebrowser:80
    depends_on:
      - filebrowser
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE_NEWT}"
        max-file: "${LOG_MAX_FILES_NEWT}"

  # ── NGINX-STATIC (serve file statici) ─────────────────────
  nginx-static:
    image: nginx:alpine
    container_name: nginx-static
    restart: always
    networks:
      - static_tunnel_net
    volumes:
      - ${NGINX_CONF_PATH}:/etc/nginx/conf.d:ro
      - ${STATIC_FILES_PATH}:/srv/static:ro
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE_NGINX}"
        max-file: "${LOG_MAX_FILES_NGINX}"

  # ── FILEBROWSER (upload + gestione file) ──────────────────
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: always
    networks:
      - filebrowser_net
    volumes:
      - ${STATIC_FILES_PATH}:/srv
      - ./filebrowser/filebrowser.db:/database/filebrowser.db
      - ./filebrowser/.filebrowser.json:/.filebrowser.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

# ── RETI ────────────────────────────────────────────────────
networks:
  static_tunnel_net:
    driver: bridge    # newt-static ↔ nginx-static
  filebrowser_net:
    driver: bridge    # newt-filebrowser ↔ filebrowser